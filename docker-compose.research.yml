version: "3.9"

# Standalone docker-compose for the Research Agent + Research UI
# Usage: docker compose -f docker-compose.research.yml up

services:
  researcher:
    build:
      context: ./agents/researcher
      dockerfile: Dockerfile
    container_name: researcher-agent
    ports:
      - "8100:8100"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RESEARCHER_MODEL=${RESEARCHER_MODEL:-gpt-4o}
      - RESEARCHER_TEMPERATURE=${RESEARCHER_TEMPERATURE:-0.1}
      - RESEARCHER_PORT=8100
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  research-ui:
    build:
      context: ./frontends/research-ui
      dockerfile: Dockerfile
    container_name: research-ui
    ports:
      - "5174:80"
    depends_on:
      researcher:
        condition: service_healthy
