[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "enterprise-ai-platform-sdk"
version = "0.1.0"
description = "Enterprise AI Platform — shared SDK for LLM clients, telemetry, and structured logging"
requires-python = ">=3.11"
dependencies = [
    "openai>=1.30.0",
    "opentelemetry-sdk>=1.24.0",
    "opentelemetry-exporter-otlp>=1.24.0",
    "opentelemetry-instrumentation-openai>=0.25.0",
    "structlog>=24.1.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["platform_sdk*"]

[tool.ruff]
line-length = 100
target-version = "py311"
