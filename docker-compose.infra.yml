# ============================================================
# enterprise-ai — Infrastructure Services
#
# Long-lived services that rarely change: databases, caches,
# proxies, observability, and policy engines.  Started once with
#   make infra-up
# and left running across dev-reset / dev-up cycles.
#
# The shared network "enterprise-ai_ai-network" is created here
# and referenced by docker-compose.yml as an external network.
# ============================================================

name: enterprise-ai

# Pinned image versions — update deliberately via PR, never use :latest
x-versions:
  pgvector:    &img-pgvector    pgvector/pgvector:pg16
  redis:       &img-redis       redis:7.2-alpine
  litellm:     &img-litellm     ghcr.io/berriai/litellm:main-v1.43.0
  otel:        &img-otel        otel/opentelemetry-collector-contrib:0.103.0
  opa:         &img-opa         openpolicyagent/opa:0.65.0-debug
  langfuse:     &img-langfuse     langfuse/langfuse:2.95.1   # Pinned — headless LANGFUSE_INIT_* requires >=2.82.0 (Sept 2024)
  langfuse-db:  &img-langfuse-db  postgres:16-alpine

services:

  # ============================================================
  # OBSERVABILITY — LangFuse (LLM tracing + prompt management)
  # ============================================================
  langfuse-db:
    image: *img-langfuse-db
    container_name: ai-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse-local-dev}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai-network

  langfuse:
    image: *img-langfuse
    container_name: ai-langfuse
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse-local-dev}@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-langfuse-dev-secret-change-me}
      NEXTAUTH_URL: http://localhost:3001
      SALT: ${LANGFUSE_SALT:-langfuse-dev-salt-change-me}
      TELEMETRY_ENABLED: "true"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      # Auto-provision a project with deterministic API keys on startup.
      # These must match LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY in .env
      # so that agent services authenticate successfully after every restart.
      LANGFUSE_INIT_PROJECT_NAME: "Enterprise AI"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@local.dev}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-admin}
      LANGFUSE_INIT_USER_NAME: "Admin"
      LANGFUSE_INIT_ORG_NAME: "Enterprise AI Platform"
    depends_on:
      langfuse-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/public/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s          # Prisma migrations on first boot can take >90s on WSL
    networks:
      - ai-network
    ports:
      - "127.0.0.1:3001:3000"    # LangFuse UI — open http://localhost:3001

  # One-shot container: verifies LANGFUSE_INIT_* provisioned keys correctly.
  # If the image is too old for headless init, falls back to REST API
  # provisioning and prints the generated keys for .env update.
  langfuse-seed:
    image: *img-langfuse-db
    container_name: ai-langfuse-seed
    entrypoint: ["/bin/sh", "/seed/seed-project.sh"]
    environment:
      LANGFUSE_URL: http://langfuse:3000
      EXPECTED_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      EXPECTED_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      SEED_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@local.dev}
      SEED_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-admin}
    volumes:
      - ./platform/langfuse/seed-project.sh:/seed/seed-project.sh:ro
    depends_on:
      langfuse:
        condition: service_healthy
    restart: "no"
    networks:
      - ai-network

  # ============================================================
  # DATABASES & CACHES
  # ============================================================
  pgvector:
    image: *img-pgvector
    container_name: ai-pgvector
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ai_memory
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./platform/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_memory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:5432:5432"    # Bind to loopback — DB clients on same machine only

  redis:
    image: *img-redis
    container_name: ai-redis
    # Require authentication; REDIS_PASSWORD from .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      # Pass the password so redis-cli can authenticate during health checks
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ai-network

  # ============================================================
  # OBSERVABILITY — OpenTelemetry Collector
  # ============================================================
  otel-collector:
    image: *img-otel
    container_name: ai-otel-collector
    volumes:
      - ./platform/otel/otel-local.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    # No depends_on — the OTel collector starts immediately alongside other
    # infrastructure with internal retry logic.
    ports:
      - "127.0.0.1:4317:4317"    # OTLP gRPC — loopback only in dev
      - "127.0.0.1:4318:4318"    # OTLP HTTP — loopback only in dev
    networks:
      - ai-network

  # ============================================================
  # AI PLATFORM — LiteLLM Proxy
  # ============================================================
  litellm:
    image: *img-litellm
    container_name: ai-litellm
    environment:
      AZURE_API_KEY: ${AZURE_API_KEY}
      AZURE_API_BASE: ${AZURE_API_BASE}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-2024-10-21}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}          # Authenticated Redis
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}      # read by litellm-local.yaml via os.environ/INTERNAL_API_KEY
      LITELLM_MASTER_KEY: ${INTERNAL_API_KEY}    # LiteLLM auto-detects this env var as fallback
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    volumes:
      - ./platform/config/litellm-local.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml"]
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      # LiteLLM uses a non-standard Python install path so we use absolute path.
      # Falls back gracefully: if /usr/local/bin/python3 is absent the container
      # will be marked unhealthy but ai-agents uses service_started (below) so
      # the stack still comes up.
      test: ["CMD", "/usr/local/bin/python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',4000)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:4000:4000"    # Loopback only in dev

  # ============================================================
  # POLICY ENGINE
  # ============================================================
  opa:
    image: *img-opa
    container_name: ai-opa
    volumes:
      - ./tools/policies/opa:/policies:ro
    command: ["run", "--server", "--addr", "0.0.0.0:8181", "--log-level", "info", "/policies"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health?plugins"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:8181:8181"    # Loopback only — needed by integration test runner
    networks:
      - ai-network

# ============================================================
# SHARED NETWORK & VOLUMES
# ============================================================
networks:
  ai-network:
    driver: bridge

volumes:
  pgdata:
  langfuse-db-data:
