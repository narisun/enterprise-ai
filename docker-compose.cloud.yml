# ============================================================
# enterprise-ai — Cloud Deployment (Single VM)
#
# Combined infrastructure + application services for Azure VM.
# Uses the same images as local dev but with production-ready
# settings: no loopback port bindings, Nginx reverse proxy,
# and health checks for all services.
#
# Usage:
#   make cloud-deploy VM_IP=<ip>   (from local desktop)
#   docker compose -f docker-compose.cloud.yml up -d  (on VM)
# ============================================================

name: enterprise-ai

# Pinned image versions
x-versions:
  pgvector:        &img-pgvector        pgvector/pgvector:pg16
  redis:           &img-redis           redis:7.2-alpine
  litellm:         &img-litellm         ghcr.io/berriai/litellm:main-v1.43.0
  otel:            &img-otel            otel/opentelemetry-collector-contrib:0.103.0
  opa:             &img-opa             openpolicyagent/opa:0.65.0-debug
  langfuse:        &img-langfuse        langfuse/langfuse:3
  langfuse-worker: &img-langfuse-worker langfuse/langfuse-worker:3
  langfuse-db:     &img-langfuse-db     postgres:16-alpine
  clickhouse:      &img-clickhouse      clickhouse/clickhouse-server:24.3
  minio:           &img-minio           minio/minio:RELEASE.2024-06-13T22-53-53Z
  nginx:           &img-nginx           nginx:1.27-alpine

# Shared env blocks
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces

x-langfuse-env: &langfuse-env
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
  LANGFUSE_HOST: http://langfuse:3000

x-langfuse-common: &langfuse-common
  DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse-local-dev}@langfuse-db:5432/langfuse
  CLICKHOUSE_URL: http://langfuse-clickhouse:8123
  CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-langfuse-clickhouse-dev}
  REDIS_HOST: langfuse-redis
  REDIS_PORT: 6379
  REDIS_AUTH: ${LANGFUSE_REDIS_PASSWORD:-langfuse-redis-dev}
  NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
  NEXTAUTH_URL: http://localhost:3001
  SALT: ${LANGFUSE_SALT}
  ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
  TELEMETRY_ENABLED: "true"
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
  # S3-compatible storage via MinIO (required by langfuse-worker v3)
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
  LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

services:

  # ============================================================
  # REVERSE PROXY — Nginx (TLS termination + routing)
  # ============================================================
  nginx:
    image: *img-nginx
    container_name: ai-nginx
    volumes:
      - ./platform/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./platform/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-certs:/etc/letsencrypt:ro
      - nginx-webroot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
      # Port 3001 NOT exposed here — langfuse container already has its own
      # docker-proxy at 127.0.0.1:3001. Binding 0.0.0.0:3001 from nginx would
      # conflict and cause Docker to abort ALL port bindings for this container.
      # Access LangFuse admin via SSH tunnel instead:
      #   ssh -L 3001:localhost:3001 azureuser@<VM_IP>
    depends_on:
      analytics-dashboard:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-network

  # ============================================================
  # LANGFUSE v3 — LLM Observability + Prompt Management
  # ============================================================
  langfuse-db:
    image: *img-langfuse-db
    container_name: ai-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ai-network

  langfuse-clickhouse:
    image: *img-clickhouse
    container_name: ai-langfuse-clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - ./platform/clickhouse/keeper-config.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ai-network

  langfuse-redis:
    image: *img-redis
    container_name: ai-langfuse-redis
    command: ["redis-server", "--requirepass", "${LANGFUSE_REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${LANGFUSE_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-network

  # MinIO — S3-compatible object storage for LangFuse event uploads
  langfuse-minio:
    image: *img-minio
    container_name: ai-langfuse-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - langfuse-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ai-network

  # One-shot container to create the langfuse-events bucket in MinIO
  langfuse-minio-init:
    image: *img-minio
    container_name: ai-langfuse-minio-init
    entrypoint: >
      /bin/sh -c "
        until mc alias set myminio http://langfuse-minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 1; done;
        mc mb --ignore-existing myminio/langfuse-events;
        echo 'Bucket langfuse-events ready';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      langfuse-minio:
        condition: service_healthy
    restart: "no"
    networks:
      - ai-network

  langfuse:
    image: *img-langfuse
    container_name: ai-langfuse
    environment:
      <<: *langfuse-common
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - ai-network

  langfuse-worker:
    image: *img-langfuse-worker
    container_name: ai-langfuse-worker
    environment:
      <<: *langfuse-common
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - ai-network

  # ============================================================
  # DATABASES & CACHES
  # ============================================================
  pgvector:
    image: *img-pgvector
    container_name: ai-pgvector
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ai_memory
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./platform/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_memory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ai-network

  redis:
    image: *img-redis
    container_name: ai-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-network

  # ============================================================
  # OBSERVABILITY — OpenTelemetry Collector
  # ============================================================
  otel-collector:
    image: *img-otel
    container_name: ai-otel-collector
    volumes:
      - ./platform/otel/otel-local.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      LANGFUSE_OTEL_AUTH: ${LANGFUSE_OTEL_AUTH:-placeholder}
    restart: unless-stopped
    networks:
      - ai-network

  # ============================================================
  # AI PLATFORM — LiteLLM Proxy
  # ============================================================
  litellm:
    image: *img-litellm
    container_name: ai-litellm
    environment:
      AZURE_API_KEY: ${AZURE_API_KEY}
      AZURE_API_BASE: ${AZURE_API_BASE}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-2024-10-21}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      LITELLM_MASTER_KEY: ${INTERNAL_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    volumes:
      - ./platform/config/litellm-local.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',4000)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - ai-network

  # ============================================================
  # POLICY ENGINE
  # ============================================================
  opa:
    image: *img-opa
    container_name: ai-opa
    volumes:
      - ./tools/policies/opa:/policies:ro
    command: ["run", "--server", "--addr", "0.0.0.0:8181", "--log-level", "info", "/policies"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health?plugins"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-network

  # ============================================================
  # MCP TOOLS
  # ============================================================
  data-mcp:
    build:
      context: .
      dockerfile: tools/data-mcp/Dockerfile
    container_name: ai-data-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      DB_HOST: pgvector
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ai_memory
      SERVICE_NAME: data-mcp
      ENVIRONMENT: production
      AGENT_ROLE: ${AGENT_ROLE:-data_analyst_agent}
      JWT_SECRET: ${JWT_SECRET}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "300"
      <<: [*otel-env, *langfuse-env]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8080)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - ai-network

  salesforce-mcp:
    build:
      context: .
      dockerfile: tools/salesforce-mcp/Dockerfile
    container_name: ai-salesforce-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      DB_HOST: pgvector
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ai_memory
      SERVICE_NAME: salesforce-mcp
      ENVIRONMENT: production
      AGENT_ROLE: ${AGENT_ROLE:-data_analyst_agent}
      JWT_SECRET: ${JWT_SECRET}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "1800"
      <<: [*otel-env, *langfuse-env]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8081)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - ai-network

  payments-mcp:
    build:
      context: .
      dockerfile: tools/payments-mcp/Dockerfile
    container_name: ai-payments-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      DB_HOST: pgvector
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ai_memory
      SERVICE_NAME: payments-mcp
      ENVIRONMENT: production
      AGENT_ROLE: ${AGENT_ROLE:-data_analyst_agent}
      JWT_SECRET: ${JWT_SECRET}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "3600"
      <<: [*otel-env, *langfuse-env]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8082)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - ai-network

  news-search-mcp:
    build:
      context: .
      dockerfile: tools/news-search-mcp/Dockerfile
    container_name: ai-news-search-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SERVICE_NAME: news-search-mcp
      ENVIRONMENT: production
      AGENT_ROLE: ${AGENT_ROLE:-data_analyst_agent}
      JWT_SECRET: ${JWT_SECRET}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "1800"
      <<: [*otel-env, *langfuse-env]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8083)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - ai-network

  # ============================================================
  # ANALYTICS AGENT
  # ============================================================
  analytics-agent:
    build:
      context: .
      dockerfile: agents/analytics-agent/Dockerfile
    container_name: ai-analytics-agent
    environment:
      LITELLM_BASE_URL: http://litellm:4000/v1
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SERVICE_NAME: analytics-agent
      DATA_MCP_URL: http://data-mcp:8080/sse
      SALESFORCE_MCP_URL: http://salesforce-mcp:8081/sse
      PAYMENTS_MCP_URL: http://payments-mcp:8082/sse
      NEWS_MCP_URL: http://news-search-mcp:8083/sse
      ENVIRONMENT: production
      JWT_SECRET: ${JWT_SECRET}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://${APP_DOMAIN:-localhost}}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-30}
      ROUTER_MODEL_ROUTE: ${ROUTER_MODEL_ROUTE:-fast-routing}
      SYNTHESIS_MODEL_ROUTE: ${SYNTHESIS_MODEL_ROUTE:-complex-routing}
      ENABLE_COMPACTION: ${ENABLE_COMPACTION:-true}
      AGENT_CONTEXT_TOKEN_LIMIT: ${AGENT_CONTEXT_TOKEN_LIMIT:-6000}
      AGENT_RECURSION_LIMIT: ${AGENT_RECURSION_LIMIT:-10}
      <<: [*otel-env, *langfuse-env]
    depends_on:
      data-mcp:
        condition: service_healthy
      salesforce-mcp:
        condition: service_healthy
      payments-mcp:
        condition: service_healthy
      news-search-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - ai-network

  # ============================================================
  # ANALYTICS DASHBOARD
  # ============================================================
  analytics-dashboard:
    build:
      context: frontends/analytics-dashboard
      dockerfile: Dockerfile
    container_name: ai-analytics-dashboard
    environment:
      ANALYTICS_AGENT_URL: http://analytics-agent:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      # Auth0 OAuth
      AUTH0_SECRET: ${AUTH0_SECRET}
      AUTH0_BASE_URL: ${AUTH0_BASE_URL}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
    depends_on:
      analytics-agent:
        condition: service_healthy
    healthcheck:
      # Hit the Next.js built-in readiness URL which always returns 200
      # (avoids the 400 that Auth0 returns on the root URL for unauthenticated requests)
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/auth/login',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    networks:
      - ai-network
    # Exposed only to Nginx, not to host
    # App Gateway → Nginx:443 → analytics-dashboard:3000

# ============================================================
# VOLUMES & NETWORK
# ============================================================
networks:
  ai-network:
    driver: bridge

volumes:
  pgdata:
  langfuse-db-data:
  langfuse-clickhouse-data:
  langfuse-minio-data:
  nginx-certs:
  nginx-webroot:
