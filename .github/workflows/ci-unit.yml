# ============================================================
# CI — Unit Tests
#
# Runs on every push and pull request.
# No Docker, no network, no LLM — must pass in under 2 minutes.
#
# Gate: blocks merge if any unit test, OPA test, or lint check fails.
# ============================================================
name: CI Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install platform SDK
        run: pip install -e platform-sdk/ --quiet

      - name: Install test dependencies
        run: |
          pip install -r tests/requirements.txt --quiet

      - name: Run unit tests
        env:
          JWT_SECRET: "ci-unit-test-jwt-secret"
          CONTEXT_HMAC_SECRET: "ci-unit-test-hmac-secret"
        run: |
          mkdir -p test-results
          python -m pytest tests/unit/ \
            -m unit \
            -v \
            --tb=short \
            --timeout=30 \
            --color=yes \
            --junit-xml=test-results/unit-py${{ matrix.python-version }}.xml \
            --cov=platform_sdk \
            --cov-report=xml:test-results/coverage-py${{ matrix.python-version }}.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --cov-branch

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-py${{ matrix.python-version }}
          path: test-results/

  # OPA policy tests run alongside unit tests — no Docker needed
  # because the OPA CLI is available on GitHub-hosted runners.
  opa-policy-tests:
    name: OPA Policy Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Read OPA_VERSION from the single source of truth in .github/versions.env
      # so this workflow and docker-compose.yml always stay in sync.
      - name: Load shared tool versions
        run: cat .github/versions.env >> $GITHUB_ENV

      - name: Install OPA CLI
        run: |
          curl -L -o opa \
            https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: Run OPA unit tests
        run: opa test tools/policies/opa/ -v

      - name: Check policy format
        run: opa fmt --diff tools/policies/opa/

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff --quiet

      # Target `.` — pyproject.toml [tool.ruff] defines what to check and
      # what to exclude. `make lint` uses the same invocation so local and
      # CI always check identical code.
      - name: Run ruff linter
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .
