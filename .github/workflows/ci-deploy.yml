# ============================================================
# CI — Deploy to Azure VM
#
# Triggers:
#   - Automatically after integration tests pass on main
#   - Manual dispatch for hotfixes or re-deploys
#
# GitHub repository secrets required (Settings > Secrets > Actions):
#   VM_SSH_PRIVATE_KEY    SSH private key for the Azure VM
#
# GitHub repository variables required (Settings > Variables > Actions):
#   VM_IP                 Azure VM public IP address
#   VM_SSH_USER           SSH username (default: azureuser)
# ============================================================
name: Deploy to Azure VM

on:
  workflow_run:
    workflows: ["Integration Tests"]
    branches: [main]
    types: [completed]

  workflow_dispatch: {}

env:
  VM_IP:       ${{ vars.VM_IP }}
  VM_SSH_USER: ${{ vars.VM_SSH_USER || 'azureuser' }}
  DEPLOY_DIR:  /opt/enterprise-ai

jobs:
  # Guard — only deploy when integration tests passed
  check-trigger:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - run: echo "Proceeding with deploy"

  deploy:
    needs: check-trigger
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://${{ vars.VM_IP }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ env.VM_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync codebase to VM
        run: |
          rsync -avz --delete \
            --exclude '.venv' \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache' \
            --exclude 'test-results' \
            --exclude '.ruff_cache' \
            --exclude '*.egg-info' \
            --exclude 'dist' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            . "${{ env.VM_SSH_USER }}@${{ env.VM_IP }}:${{ env.DEPLOY_DIR }}/"

      - name: Build and restart services
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ env.VM_SSH_USER }}@${{ env.VM_IP }}" bash <<'EOF'
          set -euo pipefail
          cd /opt/enterprise-ai

          echo "→ Building images..."
          docker compose -f docker-compose.cloud.yml build --parallel

          echo "→ Rolling restart..."
          docker compose -f docker-compose.cloud.yml up -d

          echo "→ Waiting for health checks..."
          sleep 30

          echo "→ Service status:"
          docker compose -f docker-compose.cloud.yml ps
          EOF

      - name: Smoke test
        run: |
          echo "Testing http://${{ env.VM_IP }}/ ..."
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 30 --retry 5 --retry-delay 10 \
            "http://${{ env.VM_IP }}/" || echo "000")

          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "Health check failed — HTTP ${HTTP_STATUS}"
            exit 1
          fi
          echo "Health check passed (HTTP ${HTTP_STATUS})"

      - name: Record deployment
        if: success()
        run: |
          echo "Deploy complete"
          echo "  VM:  ${{ env.VM_IP }}"
          echo "  SHA: ${{ github.sha }}"
