# docker-compose.infra-test.yml
# ─────────────────────────────────────────────────────────────────────────────
# Test-mode overlay for docker-compose.infra.yml.
#
# Extends the pgvector service to load test CSV fixtures into two additional
# schemas: salesforce.* and bankdw.*
#
# Usage:
#   docker compose -f docker-compose.infra.yml \
#                  -f docs/docker-compose.infra-test.yml up -d
#
# First-run note:
#   PostgreSQL only runs init scripts once (on a fresh volume).
#   To reload test data: make infra-reset && make infra-test-up
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Extend the infra pgvector to also load test schemas + fixtures ────────
  # File mount order (determines PostgreSQL execution sequence):
  #   01-init.sql               <- base: extensions, roles
  #   20_test_sfcrm_schema.sql  <- test: CREATE SCHEMA salesforce + 15 tables
  #   21_test_sfcrm_seed.sql    <- test: COPY from /testdata/sfcrm/*.csv
  #   30_test_bankdw_schema.sql <- test: CREATE SCHEMA bankdw + 5 tables (incl. fact_payments)
  #   31_test_bankdw_seed.sql   <- test: COPY from /testdata/bankdw/*.csv
  pgvector:
    volumes:
      # Test schema + seed SQL (appended to base compose volumes via merge)
      - ./platform/db/20_test_sfcrm_schema.sql:/docker-entrypoint-initdb.d/20_test_sfcrm_schema.sql:ro
      - ./platform/db/21_test_sfcrm_seed.sql:/docker-entrypoint-initdb.d/21_test_sfcrm_seed.sql:ro
      - ./platform/db/30_test_bankdw_schema.sql:/docker-entrypoint-initdb.d/30_test_bankdw_schema.sql:ro
      - ./platform/db/31_test_bankdw_seed.sql:/docker-entrypoint-initdb.d/31_test_bankdw_seed.sql:ro
      # CSV source files — mounted read-only so COPY FROM can reach them
      - ./testdata/sfcrm:/testdata/sfcrm:ro
      - ./testdata/bankdw:/testdata/bankdw:ro
