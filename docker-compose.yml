# ============================================================
# enterprise-ai — Single-file dev stack
#
# Everything (databases, caches, OTel, LiteLLM, OPA, MCP servers,
# agents, dashboard) runs in one compose. Designed for a single
# host: macOS (dev) or Linux VM (cloud).
#
# Lifecycle: see Makefile.
#   make setup    # wipe + rebuild + load fresh test data
#   make start    # bring up anything that isn't running
#   make stop     # stop everything (data preserved)
#   make restart  # stop then start
#
# Test fixtures (bankdw + salesforce schemas) are loaded into
# pgvector on first volume init. To re-seed, run `make setup`.
#
# LangFuse is intentionally NOT in this file — it can be added
# back later as an overlay or sidecar when richer observability
# is wanted. For now, traces flow through the OTel collector to
# its debug exporter (visible via `docker logs ai-otel-collector`).
# ============================================================

name: enterprise-ai

# Pinned image versions — update deliberately via PR, never use :latest
x-versions:
  pgvector: &img-pgvector pgvector/pgvector:pg16
  redis:    &img-redis    redis:7.2-alpine
  litellm:  &img-litellm  ghcr.io/berriai/litellm:main-v1.43.0
  otel:     &img-otel     otel/opentelemetry-collector-contrib:0.103.0
  opa:      &img-opa      openpolicyagent/opa:0.65.0-debug

# Shared env injected into every service that emits traces
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces

services:

  # ============================================================
  # POSTGRES (pgvector) — stores agent memory + bankdw + salesforce fixtures
  # ============================================================
  pgvector:
    image: *img-pgvector
    container_name: ai-pgvector
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ai_memory
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init scripts run in lexical order on a FRESH volume only.
      # 01- = base extensions/roles. 20- and 30- = test fixtures.
      - ./platform/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./platform/db/20_test_sfcrm_schema.sql:/docker-entrypoint-initdb.d/20_test_sfcrm_schema.sql:ro
      - ./platform/db/21_test_sfcrm_seed.sql:/docker-entrypoint-initdb.d/21_test_sfcrm_seed.sql:ro
      - ./platform/db/30_test_bankdw_schema.sql:/docker-entrypoint-initdb.d/30_test_bankdw_schema.sql:ro
      - ./platform/db/31_test_bankdw_seed.sql:/docker-entrypoint-initdb.d/31_test_bankdw_seed.sql:ro
      # CSV source files for COPY FROM
      - ./testdata/sfcrm:/testdata/sfcrm:ro
      - ./testdata/bankdw:/testdata/bankdw:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_memory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:5432:5432"

  # ============================================================
  # REDIS — application cache + rate-limit
  # ============================================================
  redis:
    image: *img-redis
    container_name: ai-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ai-network

  # ============================================================
  # OTEL COLLECTOR — receives spans, prints to stdout for now
  # ============================================================
  otel-collector:
    image: *img-otel
    container_name: ai-otel-collector
    volumes:
      - ./platform/otel/otel-local.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    networks:
      - ai-network

  # ============================================================
  # LITELLM — LLM gateway (Azure OpenAI routing)
  # ============================================================
  litellm:
    image: *img-litellm
    container_name: ai-litellm
    environment:
      AZURE_API_KEY: ${AZURE_API_KEY}
      AZURE_API_BASE: ${AZURE_API_BASE}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-2024-10-21}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      LITELLM_MASTER_KEY: ${INTERNAL_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    volumes:
      - ./platform/config/litellm-local.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml"]
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "/usr/local/bin/python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',4000)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:4000:4000"

  # ============================================================
  # OPA — policy engine (every MCP tool calls /v1/data/mcp/tools/allow)
  # ============================================================
  opa:
    image: *img-opa
    container_name: ai-opa
    volumes:
      - ./tools/policies/opa:/policies:ro
    command: ["run", "--server", "--addr", "0.0.0.0:8181", "--log-level", "info", "/policies"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health?plugins"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8181:8181"

  # ============================================================
  # MCP SERVERS — data-mcp / salesforce-mcp / payments-mcp / news-search-mcp
  # ============================================================
  data-mcp:
    build:
      context: .
      dockerfile: tools/data-mcp/Dockerfile
    container_name: ai-data-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      DB_HOST: pgvector
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ai_memory
      SERVICE_NAME: data-mcp
      ENVIRONMENT: ${ENVIRONMENT:-local}
      AGENT_ROLE: ${AGENT_ROLE:-data_analyst_agent}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "300"
      JWT_SECRET: ${JWT_SECRET:-test-secret-change-in-prod}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET:-test-context-secret-change-in-prod}
      <<: *otel-env
    depends_on:
      pgvector:
        condition: service_healthy
      opa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8080)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8080:8080"

  salesforce-mcp:
    build:
      context: .
      dockerfile: tools/salesforce-mcp/Dockerfile
    container_name: ai-salesforce-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      DB_HOST: pgvector
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ai_memory
      SERVICE_NAME: salesforce-mcp
      ENVIRONMENT: ${ENVIRONMENT:-local}
      AGENT_ROLE: ${AGENT_ROLE:-data_analyst_agent}
      JWT_SECRET: ${JWT_SECRET:-test-secret-change-in-prod}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET:-test-context-secret-change-in-prod}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "1800"
      <<: *otel-env
    depends_on:
      pgvector:
        condition: service_healthy
      opa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8081)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8081:8081"

  payments-mcp:
    build:
      context: .
      dockerfile: tools/payments-mcp/Dockerfile
    container_name: ai-payments-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      DB_HOST: pgvector
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ai_memory
      SERVICE_NAME: payments-mcp
      ENVIRONMENT: ${ENVIRONMENT:-local}
      AGENT_ROLE: ${AGENT_ROLE:-data_analyst_agent}
      JWT_SECRET: ${JWT_SECRET:-test-secret-change-in-prod}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET:-test-context-secret-change-in-prod}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "3600"
      <<: *otel-env
    depends_on:
      pgvector:
        condition: service_healthy
      opa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8082)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8082:8082"

  news-search-mcp:
    build:
      context: .
      dockerfile: tools/news-search-mcp/Dockerfile
    container_name: ai-news-search-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SERVICE_NAME: news-search-mcp
      ENVIRONMENT: ${ENVIRONMENT:-local}
      AGENT_ROLE: ${AGENT_ROLE:-data_analyst_agent}
      JWT_SECRET: ${JWT_SECRET:-test-secret-change-in-prod}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET:-test-context-secret-change-in-prod}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "1800"
      <<: *otel-env
    depends_on:
      opa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8083)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8083:8083"

  # ============================================================
  # GENERIC AGENT (legacy ReAct chat agent)
  # ============================================================
  ai-agents:
    build:
      context: .
      dockerfile: agents/Dockerfile
    container_name: ai-agents
    environment:
      LITELLM_BASE_URL: http://litellm:4000/v1
      MCP_SSE_URL: http://data-mcp:8080/sse
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SERVICE_NAME: ai-agents
      AGENT_MODEL_ROUTE: ${AGENT_MODEL_ROUTE:-complex-routing}
      ENABLE_COMPACTION: ${ENABLE_COMPACTION:-true}
      AGENT_CONTEXT_TOKEN_LIMIT: ${AGENT_CONTEXT_TOKEN_LIMIT:-6000}
      AGENT_RECURSION_LIMIT: ${AGENT_RECURSION_LIMIT:-10}
      <<: *otel-env
    depends_on:
      data-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8000:8000"

  # ============================================================
  # ANALYTICS AGENT — primary agentic analytics service (LangGraph)
  # ============================================================
  analytics-agent:
    build:
      context: .
      dockerfile: agents/analytics-agent/Dockerfile
    container_name: ai-analytics-agent
    environment:
      LITELLM_BASE_URL: http://litellm:4000/v1
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SERVICE_NAME: analytics-agent
      DATA_MCP_URL: http://data-mcp:8080/sse
      SALESFORCE_MCP_URL: http://salesforce-mcp:8081/sse
      PAYMENTS_MCP_URL: http://payments-mcp:8082/sse
      NEWS_MCP_URL: http://news-search-mcp:8083/sse
      ENVIRONMENT: ${ENVIRONMENT:-local}
      JWT_SECRET: ${JWT_SECRET:-test-secret-change-in-prod}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET:-test-context-secret-change-in-prod}
      ROUTER_MODEL_ROUTE: ${ROUTER_MODEL_ROUTE:-fast-routing}
      SYNTHESIS_MODEL_ROUTE: ${SYNTHESIS_MODEL_ROUTE:-complex-routing}
      ENABLE_COMPACTION: ${ENABLE_COMPACTION:-true}
      AGENT_CONTEXT_TOKEN_LIMIT: ${AGENT_CONTEXT_TOKEN_LIMIT:-6000}
      AGENT_RECURSION_LIMIT: ${AGENT_RECURSION_LIMIT:-10}
      MCP_STARTUP_TIMEOUT: "30"
      <<: *otel-env
    depends_on:
      data-mcp:
        condition: service_healthy
      salesforce-mcp:
        condition: service_healthy
      payments-mcp:
        condition: service_healthy
      news-search-mcp:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8086:8000"

  # ============================================================
  # ANALYTICS DASHBOARD — Next.js + Auth0 + Vercel AI SDK
  # ============================================================
  analytics-dashboard:
    build:
      context: frontends/analytics-dashboard
      dockerfile: Dockerfile
    container_name: ai-analytics-dashboard
    environment:
      ANALYTICS_AGENT_URL: http://analytics-agent:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      AUTH0_SECRET: ${AUTH0_SECRET}
      AUTH0_BASE_URL: ${AUTH0_BASE_URL:-http://localhost:3003}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
    depends_on:
      analytics-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:3003:3000"

# ============================================================
# Network + volumes
# ============================================================
networks:
  ai-network:
    driver: bridge

volumes:
  pgdata:
