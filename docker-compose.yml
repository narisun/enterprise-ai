# ============================================================
# enterprise-ai — Application Services
#
# Agents, MCP tools, and frontends that are rebuilt frequently
# during development.  Infrastructure (databases, caches,
# LangFuse, LiteLLM, OPA, OTel) lives in docker-compose.infra.yml
# and is started separately with `make infra-up`.
#
# Usage:
#   make infra-up        # once — starts infrastructure
#   make dev-up          # start app services (rebuilds images)
#   make dev-reset       # tear down app services + pgdata, restart
# ============================================================

name: enterprise-ai

# Shared environment injected into every service
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces

x-langfuse-env: &langfuse-env
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
  LANGFUSE_HOST: http://langfuse:3000

services:

  # ============================================================
  # MCP TOOLS
  # ============================================================
  data-mcp:
    build:
      context: .                           # Build from monorepo root
      dockerfile: tools/data-mcp/Dockerfile
    container_name: ai-data-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      DB_HOST: pgvector                    # Container name on ai-network
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ai_memory
      SERVICE_NAME: data-mcp
      ENVIRONMENT: ${ENVIRONMENT:-local}    # Stamped into OPA input
      AGENT_ROLE: ${AGENT_ROLE:-data_analyst_agent}
      # Tool-result caching via platform_sdk.ToolResultCache
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}    # Authenticated Redis
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "300"                # 5 minutes — tune based on data freshness
      # Auth context verification — must match the orchestrator's signing secrets
      JWT_SECRET: ${JWT_SECRET}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET}
      <<: [*otel-env, *langfuse-env]
    healthcheck:
      # TCP check — python3 is always present as the container runtime.
      # Avoids needing curl or wget, and works regardless of HTTP routes.
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8080)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8080:8080"    # Loopback only in dev

  # ============================================================
  # AGENT SERVICE
  # ============================================================
  ai-agents:
    build:
      context: .                           # Build from monorepo root
      dockerfile: agents/Dockerfile
    container_name: ai-agents
    environment:
      LITELLM_BASE_URL: http://litellm:4000/v1    # Container name on ai-network
      MCP_SSE_URL: http://data-mcp:8080/sse        # Container name on ai-network
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SERVICE_NAME: ai-agents
      # Agent behaviour — all tunable via AgentConfig.from_env()
      AGENT_MODEL_ROUTE: ${AGENT_MODEL_ROUTE:-complex-routing}
      ENABLE_COMPACTION: ${ENABLE_COMPACTION:-true}
      AGENT_CONTEXT_TOKEN_LIMIT: ${AGENT_CONTEXT_TOKEN_LIMIT:-6000}
      AGENT_RECURSION_LIMIT: ${AGENT_RECURSION_LIMIT:-10}
      <<: [*otel-env, *langfuse-env]
    depends_on:
      data-mcp:
        condition: service_healthy
    # Healthcheck so dependent services and orchestrators know when the
    # agent is fully ready (MCP handshake + LangGraph init included in startup)
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8000:8000"  # Bind to loopback only in dev

  # ============================================================
  # FRONTENDS — User-facing interfaces (chat UI, future plugins)
  # ============================================================
  chat-ui:
    build:
      context: .                           # Build from monorepo root
      dockerfile: frontends/chat-ui/Dockerfile
    container_name: ai-chat-ui
    environment:
      LITELLM_BASE_URL: http://litellm:4000/v1    # Container name on ai-network
      MCP_SSE_URL: http://data-mcp:8080/sse        # Container name on ai-network
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      # Required by Chainlit to sign session JWTs — generate with:
      #   python3 -c "import secrets; print(secrets.token_hex(32))"
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET}
      # Conversation history: Chainlit persists threads and messages into
      # the shared PostgreSQL instance via SQLAlchemyDataLayer (asyncpg driver).
      # Tables are created automatically on first startup.
      DATABASE_URL: "postgresql+asyncpg://admin:${POSTGRES_PASSWORD}@pgvector:5432/ai_memory"
      # Shown in the Help modal so users know which environment they are on
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_ENV: ${APP_ENV:-development}
      SERVICE_NAME: chat-ui
      # Agent behaviour — keeps chat-ui in sync with ai-agents service settings
      AGENT_MODEL_ROUTE: ${AGENT_MODEL_ROUTE:-complex-routing}
      ENABLE_COMPACTION: ${ENABLE_COMPACTION:-true}
      AGENT_CONTEXT_TOKEN_LIMIT: ${AGENT_CONTEXT_TOKEN_LIMIT:-6000}
      AGENT_RECURSION_LIMIT: ${AGENT_RECURSION_LIMIT:-10}
      <<: [*otel-env, *langfuse-env]
    depends_on:
      data-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8501/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8501:8501"    # Chat UI — open http://localhost:8501 in your browser

  # ============================================================
  # ANALYTICS AGENT — MCP SERVERS (data sources)
  # ============================================================
  salesforce-mcp:
    build:
      context: .                           # Build from monorepo root
      dockerfile: tools/salesforce-mcp/Dockerfile
    container_name: ai-salesforce-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      DB_HOST: pgvector
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ai_memory
      SERVICE_NAME: salesforce-mcp
      ENVIRONMENT: ${ENVIRONMENT:-local}
      AGENT_ROLE: ${AGENT_ROLE:-data_analyst_agent}
      JWT_SECRET: ${JWT_SECRET}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "1800"              # 30 minutes — CRM data is human-updated
      <<: [*otel-env, *langfuse-env]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8081)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8081:8081"    # Loopback only in dev

  payments-mcp:
    build:
      context: .                           # Build from monorepo root
      dockerfile: tools/payments-mcp/Dockerfile
    container_name: ai-payments-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      DB_HOST: pgvector
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ai_memory
      SERVICE_NAME: payments-mcp
      ENVIRONMENT: ${ENVIRONMENT:-local}
      AGENT_ROLE: ${AGENT_ROLE:-data_analyst_agent}
      JWT_SECRET: ${JWT_SECRET}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "3600"              # 1 hour — payments loaded in nightly batches
      <<: [*otel-env, *langfuse-env]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8082)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8082:8082"    # Loopback only in dev

  news-search-mcp:
    build:
      context: .                           # Build from monorepo root
      dockerfile: tools/news-search-mcp/Dockerfile
    container_name: ai-news-search-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow   # Added — news-mcp now calls OPA
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}  # Optional — uses mock data if not set
      SERVICE_NAME: news-search-mcp
      ENVIRONMENT: ${ENVIRONMENT:-local}
      AGENT_ROLE: ${AGENT_ROLE:-data_analyst_agent}
      JWT_SECRET: ${JWT_SECRET}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "1800"              # 30 minutes — news is latency-tolerant
      <<: [*otel-env, *langfuse-env]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8083)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8083:8083"    # Loopback only in dev

  # ============================================================
  # ANALYTICS AGENT — Agentic analytics platform (LangGraph)
  # ============================================================
  analytics-agent:
    build:
      context: .                           # Build from monorepo root
      dockerfile: agents/analytics-agent/Dockerfile
    container_name: ai-analytics-agent
    environment:
      LITELLM_BASE_URL: http://litellm:4000/v1
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SERVICE_NAME: analytics-agent
      # MCP server endpoints for data retrieval
      DATA_MCP_URL: http://data-mcp:8080/sse
      SALESFORCE_MCP_URL: http://salesforce-mcp:8081/sse
      PAYMENTS_MCP_URL: http://payments-mcp:8082/sse
      NEWS_MCP_URL: http://news-search-mcp:8083/sse
      # Environment & security — controls orchestrator role and HMAC signing
      ENVIRONMENT: ${ENVIRONMENT:-local}
      JWT_SECRET: ${JWT_SECRET}
      CONTEXT_HMAC_SECRET: ${CONTEXT_HMAC_SECRET}
      # Agent behaviour — model tiering for analytics
      ROUTER_MODEL_ROUTE: ${ROUTER_MODEL_ROUTE:-fast-routing}
      SYNTHESIS_MODEL_ROUTE: ${SYNTHESIS_MODEL_ROUTE:-complex-routing}
      ENABLE_COMPACTION: ${ENABLE_COMPACTION:-true}
      AGENT_CONTEXT_TOKEN_LIMIT: ${AGENT_CONTEXT_TOKEN_LIMIT:-6000}
      AGENT_RECURSION_LIMIT: ${AGENT_RECURSION_LIMIT:-10}
      <<: [*otel-env, *langfuse-env]
    depends_on:
      data-mcp:
        condition: service_healthy
      salesforce-mcp:
        condition: service_healthy
      payments-mcp:
        condition: service_healthy
      news-search-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8086:8000"    # Analytics Agent API — loopback only in dev

  # ============================================================
  # ANALYTICS DASHBOARD — Next.js 15 + Shadcn/ui + Vercel AI SDK
  # ============================================================
  analytics-dashboard:
    build:
      context: frontends/analytics-dashboard
      dockerfile: Dockerfile
    container_name: ai-analytics-dashboard
    environment:
      ANALYTICS_AGENT_URL: http://analytics-agent:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      # Auth0 OAuth
      AUTH0_SECRET: ${AUTH0_SECRET}
      AUTH0_BASE_URL: ${AUTH0_BASE_URL:-http://localhost:3003}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
    depends_on:
      analytics-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:3003:3000"    # Analytics Dashboard — open http://localhost:3003

# ============================================================
# SHARED NETWORK — created by docker-compose.infra.yml
# ============================================================
networks:
  ai-network:
    external: true
    name: enterprise-ai_ai-network
