# ============================================================
# enterprise-ai — Unified Local Development Stack
#
# All services share one Docker network (ai-network), so they
# reach each other by service name. No host.docker.internal.
#
# Usage:
#   cp .env.example .env && nano .env   # fill in credentials
#   make dev-up
# ============================================================

name: enterprise-ai

# Pinned image versions — update deliberately via PR, never use :latest
x-versions:
  pgvector:    &img-pgvector    pgvector/pgvector:pg16
  redis:       &img-redis       redis:7.2-alpine
  litellm:     &img-litellm     ghcr.io/berriai/litellm:main-v1.43.0
  otel:        &img-otel        otel/opentelemetry-collector-contrib:0.103.0
  opa:         &img-opa         openpolicyagent/opa:0.65.0-debug

# Shared environment injected into every service
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces

services:

  # ============================================================
  # INFRASTRUCTURE
  # ============================================================
  pgvector:
    image: *img-pgvector
    container_name: ai-pgvector
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ai_memory
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./platform/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./platform/db/rm_prep_schema.sql:/docker-entrypoint-initdb.d/02-rm_prep_schema.sql:ro
      - ./platform/db/rm_prep_seed.sql:/docker-entrypoint-initdb.d/03-rm_prep_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_memory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:5432:5432"    # L4: bind to loopback — DB clients on same machine only

  redis:
    image: *img-redis
    container_name: ai-redis
    # H5: require authentication; REDIS_PASSWORD from .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      # Pass the password so redis-cli can authenticate during health checks
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ai-network

  otel-collector:
    image: *img-otel
    container_name: ai-otel-collector
    environment:
      DYNATRACE_ENDPOINT: ${DYNATRACE_ENDPOINT:-}
      DYNATRACE_API_TOKEN: ${DYNATRACE_API_TOKEN:-}
    volumes:
      - ./platform/otel/otel-local.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "127.0.0.1:4317:4317"    # L4: OTLP gRPC — loopback only in dev
      - "127.0.0.1:4318:4318"    # L4: OTLP HTTP — loopback only in dev
    networks:
      - ai-network

  # ============================================================
  # AI PLATFORM — LiteLLM Proxy
  # ============================================================
  litellm:
    image: *img-litellm
    container_name: ai-litellm
    environment:
      AZURE_API_KEY: ${AZURE_API_KEY}
      AZURE_API_BASE: ${AZURE_API_BASE}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-2024-10-21}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}          # H5: authenticated Redis
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}      # read by litellm-local.yaml via os.environ/INTERNAL_API_KEY
      LITELLM_MASTER_KEY: ${INTERNAL_API_KEY}    # LiteLLM auto-detects this env var as fallback
      <<: *otel-env
    volumes:
      - ./platform/config/litellm-local.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml"]
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      # LiteLLM uses a non-standard Python install path so we use absolute path.
      # Falls back gracefully: if /usr/local/bin/python3 is absent the container
      # will be marked unhealthy but ai-agents uses service_started (below) so
      # the stack still comes up.
      test: ["CMD", "/usr/local/bin/python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',4000)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:4000:4000"    # L4: loopback only in dev

  # ============================================================
  # POLICY ENGINE
  # ============================================================
  opa:
    image: *img-opa
    container_name: ai-opa
    volumes:
      - ./tools/policies/opa:/policies:ro
    command: ["run", "--server", "--addr", "0.0.0.0:8181", "--log-level", "info", "/policies"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health?plugins"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-network

  # ============================================================
  # MCP TOOLS
  # ============================================================
  data-mcp:
    build:
      context: .                           # Build from monorepo root
      dockerfile: tools/data-mcp/Dockerfile
    container_name: ai-data-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      DB_HOST: pgvector                    # Container name on ai-network
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ai_memory
      SERVICE_NAME: data-mcp
      ENVIRONMENT: ${ENVIRONMENT:-local}    # H3: stamped into OPA input
      AGENT_ROLE: ${AGENT_ROLE:-data_analyst_agent}
      # Tool-result caching via platform_sdk.ToolResultCache
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}    # H5: authenticated Redis
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "300"                # 5 minutes — tune based on data freshness
      <<: *otel-env
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      # TCP check — python3 is always present as the container runtime.
      # Avoids needing curl or wget, and works regardless of HTTP routes.
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8080)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8080:8080"    # L4: loopback only in dev

  # ============================================================
  # AGENT SERVICE
  # ============================================================
  ai-agents:
    build:
      context: .                           # Build from monorepo root
      dockerfile: agents/Dockerfile
    container_name: ai-agents
    environment:
      LITELLM_BASE_URL: http://litellm:4000/v1    # Container name on ai-network
      MCP_SSE_URL: http://data-mcp:8080/sse        # Container name on ai-network
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SERVICE_NAME: ai-agents
      # Agent behaviour — all tunable via AgentConfig.from_env()
      AGENT_MODEL_ROUTE: ${AGENT_MODEL_ROUTE:-complex-routing}
      ENABLE_COMPACTION: ${ENABLE_COMPACTION:-true}
      AGENT_CONTEXT_TOKEN_LIMIT: ${AGENT_CONTEXT_TOKEN_LIMIT:-6000}
      AGENT_RECURSION_LIMIT: ${AGENT_RECURSION_LIMIT:-10}
      <<: *otel-env
    depends_on:
      litellm:
        condition: service_healthy
      data-mcp:
        condition: service_healthy
    # M4: healthcheck so dependent services and orchestrators know when the
    # agent is fully ready (MCP handshake + LangGraph init included in startup)
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8000:8000"  # L4: bind to loopback only in dev

  # ============================================================
  # FRONTENDS — User-facing interfaces (chat UI, future plugins)
  # ============================================================
  chat-ui:
    build:
      context: .                           # Build from monorepo root
      dockerfile: frontends/chat-ui/Dockerfile
    container_name: ai-chat-ui
    environment:
      LITELLM_BASE_URL: http://litellm:4000/v1    # Container name on ai-network
      MCP_SSE_URL: http://data-mcp:8080/sse        # Container name on ai-network
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      # Required by Chainlit to sign session JWTs — generate with:
      #   python3 -c "import secrets; print(secrets.token_hex(32))"
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET}
      # Conversation history: Chainlit persists threads and messages into
      # the shared PostgreSQL instance via SQLAlchemyDataLayer (asyncpg driver).
      # Tables are created automatically on first startup.
      DATABASE_URL: "postgresql+asyncpg://admin:${POSTGRES_PASSWORD}@pgvector:5432/ai_memory"
      # Shown in the Help modal so users know which environment they are on
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_ENV: ${APP_ENV:-development}
      SERVICE_NAME: chat-ui
      # Agent behaviour — keeps chat-ui in sync with ai-agents service settings
      AGENT_MODEL_ROUTE: ${AGENT_MODEL_ROUTE:-complex-routing}
      ENABLE_COMPACTION: ${ENABLE_COMPACTION:-true}
      AGENT_CONTEXT_TOKEN_LIMIT: ${AGENT_CONTEXT_TOKEN_LIMIT:-6000}
      AGENT_RECURSION_LIMIT: ${AGENT_RECURSION_LIMIT:-10}
      <<: *otel-env
    depends_on:
      litellm:
        condition: service_healthy
      data-mcp:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8501/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8501:8501"    # Chat UI — open http://localhost:8501 in your browser

  # ============================================================
  # RM PREP AGENT — MCP SERVERS (data sources)
  # ============================================================
  salesforce-mcp:
    build:
      context: .                           # Build from monorepo root
      dockerfile: tools/salesforce-mcp/Dockerfile
    container_name: ai-salesforce-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      DB_HOST: pgvector
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ai_memory
      SERVICE_NAME: salesforce-mcp
      ENVIRONMENT: ${ENVIRONMENT:-local}
      AGENT_ROLE: rm_prep_agent
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "1800"              # 30 minutes — CRM data is human-updated
      <<: *otel-env
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8081)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8081:8081"    # L4: loopback only in dev

  payments-mcp:
    build:
      context: .                           # Build from monorepo root
      dockerfile: tools/payments-mcp/Dockerfile
    container_name: ai-payments-mcp
    environment:
      MCP_TRANSPORT: sse
      OPA_URL: http://opa:8181/v1/data/mcp/tools/allow
      DB_HOST: pgvector
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ai_memory
      SERVICE_NAME: payments-mcp
      ENVIRONMENT: ${ENVIRONMENT:-local}
      AGENT_ROLE: rm_prep_agent
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "3600"              # 1 hour — payments loaded in nightly batches
      <<: *otel-env
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8082)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8082:8082"    # L4: loopback only in dev

  news-search-mcp:
    build:
      context: .                           # Build from monorepo root
      dockerfile: tools/news-search-mcp/Dockerfile
    container_name: ai-news-search-mcp
    environment:
      MCP_TRANSPORT: sse
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}  # Optional — uses mock data if not set
      SERVICE_NAME: news-search-mcp
      ENVIRONMENT: ${ENVIRONMENT:-local}
      AGENT_ROLE: rm_prep_agent
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_TOOL_CACHE: "true"
      TOOL_CACHE_TTL: "1800"              # 30 minutes — news is latency-tolerant
      <<: *otel-env
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); r=s.connect_ex(('localhost',8083)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8083:8083"    # L4: loopback only in dev

  # ============================================================
  # RM PREP AGENT — Orchestrator Service
  # ============================================================
  rm-prep-agent:
    build:
      context: .                           # Build from monorepo root
      dockerfile: agents/rm-prep/Dockerfile
    container_name: ai-rm-prep-agent
    environment:
      LITELLM_BASE_URL: http://litellm:4000/v1
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SERVICE_NAME: rm-prep-agent
      SALESFORCE_MCP_URL: http://salesforce-mcp:8081/sse
      PAYMENTS_MCP_URL: http://payments-mcp:8082/sse
      NEWS_MCP_URL: http://news-search-mcp:8083/sse
      # Agent behaviour — model tiering for RM Prep orchestrator
      ROUTER_MODEL_ROUTE: ${ROUTER_MODEL_ROUTE:-fast-routing}
      SPECIALIST_MODEL_ROUTE: ${SPECIALIST_MODEL_ROUTE:-fast-routing}
      SYNTHESIS_MODEL_ROUTE: ${SYNTHESIS_MODEL_ROUTE:-complex-routing}
      ENABLE_COMPACTION: ${ENABLE_COMPACTION:-true}
      AGENT_CONTEXT_TOKEN_LIMIT: ${AGENT_CONTEXT_TOKEN_LIMIT:-6000}
      AGENT_RECURSION_LIMIT: ${AGENT_RECURSION_LIMIT:-10}
      <<: *otel-env
    depends_on:
      litellm:
        condition: service_healthy
      salesforce-mcp:
        condition: service_healthy
      payments-mcp:
        condition: service_healthy
      news-search-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8003:8003"    # L4: loopback only in dev

  # ============================================================
  # PORTFOLIO WATCH AGENT — Morgan (Generator-Evaluator pattern)
  # ============================================================
  portfolio-watch-agent:
    build:
      context: .                           # Build from monorepo root
      dockerfile: agents/portfolio-watch/Dockerfile
    container_name: ai-portfolio-watch-agent
    environment:
      LITELLM_BASE_URL: http://litellm:4000/v1
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SERVICE_NAME: portfolio-watch-agent
      # Both Generator and Evaluator use the complex (Sonnet) model route
      SYNTHESIS_MODEL_ROUTE: ${SYNTHESIS_MODEL_ROUTE:-complex-routing}
      ROUTER_MODEL_ROUTE: ${ROUTER_MODEL_ROUTE:-fast-routing}
      SPECIALIST_MODEL_ROUTE: ${SPECIALIST_MODEL_ROUTE:-fast-routing}
      ENABLE_COMPACTION: ${ENABLE_COMPACTION:-true}
      AGENT_CONTEXT_TOKEN_LIMIT: ${AGENT_CONTEXT_TOKEN_LIMIT:-6000}
      AGENT_RECURSION_LIMIT: ${AGENT_RECURSION_LIMIT:-15}
      <<: *otel-env
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:8004:8004"    # L4: loopback only in dev

  # ============================================================
  # AGENT UI — React frontend (supports multiple agents)
  # ============================================================
  agent-ui:
    build:
      context: frontends/agent-ui
      dockerfile: Dockerfile
      args:
        VITE_API_KEY: ${INTERNAL_API_KEY}
    container_name: ai-agent-ui
    depends_on:
      rm-prep-agent:
        condition: service_healthy
      portfolio-watch-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai-network
    ports:
      - "127.0.0.1:3000:80"    # React UI — open http://localhost:3000 in your browser


# ============================================================
# SHARED NETWORK & VOLUMES
# ============================================================
networks:
  ai-network:
    driver: bridge

volumes:
  pgdata:
