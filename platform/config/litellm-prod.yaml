# ============================================================
# platform/config/litellm-prod.yaml
#
# LiteLLM config for production — Azure OpenAI only.
# Bedrock removed; Azure is the sole provider.
# Credentials come from Kubernetes Secrets, injected as env vars.
# ============================================================

model_list:

  # ---- Complex reasoning / synthesis (GPT-4o) --------------------------------
  - model_name: complex-routing
    litellm_params:
      model: azure/gpt-4o-deployment
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

  # ---- Fast / cheap routing (GPT-4o-mini) ------------------------------------
  - model_name: fast-routing
    litellm_params:
      model: azure/gpt-4o-mini-deployment
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

litellm_settings:
  cache: true
  cache_type: redis
  redis_host: redis-master.ai-platform.svc.cluster.local
  redis_port: 6379
  redis_password: os.environ/REDIS_PASSWORD
  success_callback: ["otel"]
  failure_callback: ["otel"]
  drop_params: true
  request_timeout: 60
  # Cross-route fallback if complex model fails
  fallbacks: [{"complex-routing": ["fast-routing"]}]
  allowed_fails: 1

general_settings:
  master_key: os.environ/INTERNAL_API_KEY
