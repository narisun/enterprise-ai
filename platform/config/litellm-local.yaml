# ============================================================
# platform/config/litellm-local.yaml
#
# LiteLLM config for local development — Azure OpenAI only.
#
# Azure deployment names:
#   complex-routing → gpt-4o-deployment      (GPT-4o)
#   fast-routing    → gpt-4o-mini-deployment (GPT-4o-mini)
# ============================================================

model_list:

  # ---- Complex reasoning / synthesis (GPT-4o) --------------------------------
  # Used by: synthesis node (RM brief generation), main enterprise agent.
  - model_name: complex-routing
    litellm_params:
      model: azure/gpt-4o-deployment
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

  # ---- Fast / cheap routing (GPT-4o-mini) ------------------------------------
  # Used by: intent router, all specialist agents (CRM/Payments/News), compaction.
  - model_name: fast-routing
    litellm_params:
      model: azure/gpt-4o-mini-deployment
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

litellm_settings:
  cache: true
  cache_type: redis
  redis_host: redis
  redis_port: 6379
  redis_password: os.environ/REDIS_PASSWORD
  success_callback: ["otel"]
  failure_callback: ["otel"]
  drop_params: true
  request_timeout: 60

general_settings:
  master_key: os.environ/INTERNAL_API_KEY
  store_model_in_db: false
