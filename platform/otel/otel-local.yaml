# ============================================================
# platform/otel/otel-local.yaml
#
# OTel Collector — local development configuration.
#
# All telemetry (infrastructure + LLM traces) flows through this
# collector and is exported to:
#   1. LangFuse via OTLP/HTTP — LLM observability
#   2. Debug (console) — local development visibility
#
# To swap LangFuse for another backend (Datadog, Honeycomb, etc),
# replace the otlp/langfuse exporter — no application code changes.
# ============================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 100
    timeout: 5s
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  # Tag every signal with project=enterprise-ai so dashboards can
  # filter to this stack even in a multi-project environment
  resource:
    attributes:
      - action: insert
        key: project
        value: enterprise-ai

exporters:
  # Human-readable console output for local debugging
  debug:
    verbosity: normal

  # LangFuse v3 OTLP ingestion endpoint.
  # Authentication: Basic base64(LANGFUSE_PUBLIC_KEY:LANGFUSE_SECRET_KEY)
  # Generate the auth string:
  #   echo -n "pk-lf-xxx:sk-lf-xxx" | base64
  # Then set LANGFUSE_OTEL_AUTH in .env
  otlphttp/langfuse:
    endpoint: http://langfuse:3000/api/public/otel
    tls:
      insecure: true
    headers:
      Authorization: "Basic ${env:LANGFUSE_OTEL_AUTH}"

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [debug, otlphttp/langfuse]
    metrics:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [debug]
