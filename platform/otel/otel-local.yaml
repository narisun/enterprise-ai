# ============================================================
# platform/otel/otel-local.yaml
#
# OTel Collector — local development configuration.
#
# Traces are exported to Dynatrace if credentials are set,
# AND printed to console so developers can see them immediately.
# Leave DYNATRACE_* vars empty to skip remote export.
# ============================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 100
    timeout: 5s
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

exporters:
  # Human-readable console output for local debugging
  debug:
    verbosity: normal

  # Remote Dynatrace export (only active if credentials are provided)
  otlphttp/dynatrace:
    endpoint: "${env:DYNATRACE_ENDPOINT}/api/v2/otlp"
    headers:
      Authorization: "Api-Token ${env:DYNATRACE_API_TOKEN}"

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, otlphttp/dynatrace]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, otlphttp/dynatrace]
