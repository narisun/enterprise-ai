# ============================================================
# platform/otel/otel-local.yaml
#
# OTel Collector — local development configuration.
#
# Spans/metrics arrive from agents and are exported to the
# `debug` exporter (stdout). To inspect:
#   docker logs ai-otel-collector
#
# When richer observability is wanted, add a backend exporter
# (LangFuse, Datadog, Honeycomb, etc.) below and append it to
# the `exporters:` list under `service.pipelines.traces`. No
# application code changes are required.
# ============================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 100
    timeout: 5s
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  # Tag every signal with project=enterprise-ai so dashboards can
  # filter to this stack even in a multi-project environment
  resource:
    attributes:
      - action: insert
        key: project
        value: enterprise-ai

exporters:
  # Human-readable console output for local debugging.
  # Verbosity options: basic | normal | detailed
  debug:
    verbosity: detailed

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [debug]
    metrics:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [debug]
