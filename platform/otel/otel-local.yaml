# ============================================================
# platform/otel/otel-local.yaml
#
# OTel Collector — local development configuration.
#
# Spans/metrics arrive from agents and are exported to:
#   1. debug             — stdout (visible via `docker logs ai-otel-collector`)
#   2. otlphttp/langfuse — Langfuse v2 OTLP endpoint at /api/public/otel
#
# The Langfuse pipeline branch is failure-tolerant: if the auth header
# is missing or invalid the exporter logs and drops, while the debug
# exporter still receives the spans — observability never breaks just
# because Langfuse is misconfigured.
#
# Auth: LANGFUSE_OTEL_AUTH must be the base64 of "public_key:secret_key".
# Generate after registering a project at http://localhost:3001:
#   echo -n "$LANGFUSE_PUBLIC_KEY:$LANGFUSE_SECRET_KEY" | base64
# ============================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 100
    timeout: 5s
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  # Tag every signal with project=enterprise-ai so dashboards can
  # filter to this stack even in a multi-project environment
  resource:
    attributes:
      - action: insert
        key: project
        value: enterprise-ai

exporters:
  # Human-readable console output for local debugging.
  # Verbosity options: basic | normal | detailed
  debug:
    verbosity: detailed

  # Langfuse v2 OTLP ingestion endpoint.
  # Authentication: Basic base64(LANGFUSE_PUBLIC_KEY:LANGFUSE_SECRET_KEY)
  otlphttp/langfuse:
    endpoint: http://langfuse:3000/api/public/otel
    tls:
      insecure: true
    headers:
      Authorization: "Basic ${env:LANGFUSE_OTEL_AUTH}"

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [debug, otlphttp/langfuse]
    metrics:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [debug]
