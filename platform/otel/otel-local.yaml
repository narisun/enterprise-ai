# ============================================================
# platform/otel/otel-local.yaml
#
# OTel Collector — local development configuration.
#
# Spans/metrics arrive from agents and are exported to:
#   1. debug — stdout (visible via `docker logs ai-otel-collector`)
#
# Langfuse v2 has no OTLP endpoint, so LangGraph traces are sent
# directly to Langfuse from the agent process via a LangChain
# CallbackHandler (see platform_sdk.telemetry.get_langfuse_callback_handler).
# Infrastructure spans (HTTP, DB) still flow through OTel and
# land in the debug exporter for local inspection.
# ============================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 100
    timeout: 5s
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  # Tag every signal with project=enterprise-ai so dashboards can
  # filter to this stack even in a multi-project environment
  resource:
    attributes:
      - action: insert
        key: project
        value: enterprise-ai

exporters:
  # Human-readable console output for local debugging.
  # Verbosity options: basic | normal | detailed
  debug:
    verbosity: detailed

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [debug]
    metrics:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [debug]
