# ============================================================
# Grafana datasource provisioning — auto-wires Loki on startup.
# No manual "Add datasource" step needed.
# ============================================================

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    version: 1
    editable: false
    jsonData:
      maxLines: 1000
      # Derived fields: turn trace IDs in log lines into clickable links
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"(\w+)"'
          url: ''
          urlDisplayLabel: 'Trace: $${__value.raw}'
