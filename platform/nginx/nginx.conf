# ============================================================
# enterprise-ai — Nginx reverse proxy
#
# Routes:
#   :80  / :443  → analytics-dashboard:3000 (public via WAF)
#   :3001        → langfuse:3000            (admin only, NSG-restricted)
#
# TLS is handled by Let's Encrypt via certbot.
# Before certs exist, only HTTP is served.
# ============================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    client_max_body_size 50m;

    # Security headers applied to all responses
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Docker embedded DNS — required so nginx resolves container names at
    # request time (via $variable proxy_pass) rather than at startup.
    # Without this, nginx fails to start if an upstream is temporarily unavailable.
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    include /etc/nginx/conf.d/*.conf;
}
