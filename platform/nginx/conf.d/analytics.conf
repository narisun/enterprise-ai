# ============================================================
# Analytics Dashboard — public endpoint (behind Azure WAF)
# ============================================================
# NOTE: No upstream{} block here. We use a $variable proxy_pass so
# nginx defers DNS resolution to request time (via resolver 127.0.0.11
# set in nginx.conf). A static upstream{} block resolves at startup and
# causes nginx to refuse to start if the container isn't reachable yet.
# ============================================================

# HTTP — serves Let's Encrypt challenges + redirects to HTTPS
server {
    listen 80;
    server_name ai.quantitix.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS termination + reverse proxy to dashboard
server {
    listen 443 ssl;
    server_name ai.quantitix.com;

    ssl_certificate     /etc/letsencrypt/live/ai.quantitix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.quantitix.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        # Variable forces runtime DNS resolution via Docker's 127.0.0.11 resolver
        set $dashboard_upstream http://analytics-dashboard:3000;
        proxy_pass $dashboard_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # SSE / streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
