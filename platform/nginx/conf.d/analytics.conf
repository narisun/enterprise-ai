# ============================================================
# Analytics Dashboard — public endpoint (behind Azure WAF)
# ============================================================

upstream analytics_dashboard {
    server analytics-dashboard:3000;
}

# HTTP — serves Let's Encrypt challenges + redirects to HTTPS
server {
    listen 80;
    server_name ai.quantitix.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS termination + reverse proxy to dashboard
server {
    listen 443 ssl;
    server_name ai.quantitix.com;

    ssl_certificate     /etc/letsencrypt/live/ai.quantitix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.quantitix.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://analytics_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # SSE / streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
