# docker-compose.test.yml
# ─────────────────────────────────────────────────────────────────────────────
# Test-mode overlay for docker-compose.yml.
#
# What it does:
#   1. Extends the base pgvector service to also load the test CSV fixtures
#      into two additional schemas: salesforce.* and bankdw.*
#   2. Enables JWT auth on the RM Prep orchestrator
#   3. Shows a persona-selector login panel in the Streamlit UI
#
# What it does NOT do:
#   - No DuckDB containers — MCP servers connect to the same PostgreSQL,
#     same asyncpg code, zero production/test divergence
#   - No changes to Redis, LiteLLM, OPA, or any other infra service
#   - No DB_BACKEND switches or adapter abstractions
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up --build
#
# First-run note:
#   PostgreSQL only runs init scripts once (on a fresh volume).
#   To reload test data after a schema change:
#     docker compose -f docker-compose.yml -f docker-compose.test.yml down -v
#     docker compose -f docker-compose.yml -f docker-compose.test.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Extend the base pgvector to also load test schemas + fixtures ──────────
  # The base compose already mounts 01-init.sql, 02-rm_prep_schema.sql,
  # 03-rm_prep_seed.sql.  We add four more files at higher numbers so
  # PostgreSQL's init.d alphabetical ordering runs them after the base scripts.
  #
  # File mount order (determines PostgreSQL execution sequence):
  #   01-init.sql               ← base: extensions, roles
  #   02-rm_prep_schema.sql     ← base: rm_prep tables in public schema
  #   03-rm_prep_seed.sql       ← base: rm_prep seed data
  #   20_test_sfcrm_schema.sql  ← test: CREATE SCHEMA salesforce + 15 tables
  #   21_test_sfcrm_seed.sql    ← test: COPY from /testdata/sfcrm/*.csv
  #   30_test_bankdw_schema.sql ← test: CREATE SCHEMA bankdw + 5 tables (incl. fact_payments)
  #   31_test_bankdw_seed.sql   ← test: COPY from /testdata/bankdw/*.csv
  pgvector:
    volumes:
      # Test schema + seed SQL (appended to base compose volumes via merge)
      - ./platform/db/20_test_sfcrm_schema.sql:/docker-entrypoint-initdb.d/20_test_sfcrm_schema.sql:ro
      - ./platform/db/21_test_sfcrm_seed.sql:/docker-entrypoint-initdb.d/21_test_sfcrm_seed.sql:ro
      - ./platform/db/30_test_bankdw_schema.sql:/docker-entrypoint-initdb.d/30_test_bankdw_schema.sql:ro
      - ./platform/db/31_test_bankdw_seed.sql:/docker-entrypoint-initdb.d/31_test_bankdw_seed.sql:ro
      # CSV source files — mounted read-only so COPY FROM can reach them
      - ./testdata/sfcrm:/testdata/sfcrm:ro
      - ./testdata/bankdw:/testdata/bankdw:ro

  # ── MCP servers — unchanged code, same asyncpg connection ─────────────────
  # salesforce-mcp and payments-mcp already connect to the pgvector service
  # via DATABASE_URL.  No changes needed — the test schemas are now present
  # in the same PostgreSQL instance they already talk to.

  # ── Orchestrator with JWT enforcement ─────────────────────────────────────
  rm-prep-agent:
    environment:
      AUTH_MODE: jwt
      JWT_SECRET: ${JWT_SECRET:-test-secret-change-in-prod}

  # ── UI — test persona login panel ─────────────────────────────────────────
  rm-prep-ui:
    environment:
      AUTH_MODE: jwt
      JWT_SECRET: ${JWT_SECRET:-test-secret-change-in-prod}
      SHOW_TEST_LOGIN: "true"    # renders persona selector + token debug panel
