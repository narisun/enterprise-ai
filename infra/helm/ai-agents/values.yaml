image:
  repository: enterprise-ai/ai-agents
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 2

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

service:
  port: 8000

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

env:
  AGENT_MODEL_ROUTE: complex-routing
  AGENT_RECURSION_LIMIT: "10"
  SERVICE_NAME: ai-agents
  # Internal service URLs (Kubernetes DNS)
  LITELLM_BASE_URL: http://litellm.ai-platform.svc.cluster.local:4000/v1
  MCP_SSE_URL: http://data-mcp.ai-platform.svc.cluster.local:8080/sse

# Secret containing INTERNAL_API_KEY, OTEL creds
secretName: ai-agents-secrets
