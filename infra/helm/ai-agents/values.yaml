image:
  # Full ECR URI is set by CI: <account>.dkr.ecr.<region>.amazonaws.com/enterprise-ai/ai-agents
  # CI override: --set image.repository=$ECR_REGISTRY/enterprise-ai/ai-agents --set image.tag=$GIT_SHA
  repository: "REPLACE_WITH_ECR_URI"
  tag: "REPLACE_ME"
  pullPolicy: IfNotPresent

replicaCount: 2

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

service:
  port: 8000

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

env:
  AGENT_MODEL_ROUTE: complex-routing
  AGENT_RECURSION_LIMIT: "10"
  SERVICE_NAME: ai-agents
  # Internal service URLs (Kubernetes DNS)
  LITELLM_BASE_URL: http://litellm.ai-platform.svc.cluster.local:4000/v1
  MCP_SSE_URL: http://data-mcp.ai-platform.svc.cluster.local:8080/sse

# Secret containing INTERNAL_API_KEY, OTEL creds
# Created by External Secrets Operator from AWS Secrets Manager (see infra/k8s/secrets/)
secretName: ai-agents-secrets

ingress:
  enabled: false          # Set true in values-dev.yaml / values-prod.yaml
  scheme: internet-facing # or internal for VPN-only access
  host: ""                # e.g. api.enterprise-ai.example.com — set in values-prod.yaml
  certificateArn: ""      # ACM cert ARN — set in values-prod.yaml
  accessLogsBucket: ""    # S3 bucket for ALB access logs — set in values-prod.yaml
  wafAclArn: ""           # WAFv2 ACL ARN — optional, set in values-prod.yaml
