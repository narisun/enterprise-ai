# Dev overrides — smaller footprint
litellm:
  replicaCount: 1
  hpa:
    minReplicas: 1
    maxReplicas: 3
  # Disable Redis cache in dev — avoids ElastiCache TLS/auth complexity.
  # LiteLLM works fine without it; re-enable for prod.
  disableCache: true
  # Disable master_key in dev — LiteLLM requires a DATABASE_URL when master_key
  # is set. LiteLLM is ClusterIP-only; auth is enforced at the ai-agents layer.
  disableMasterKey: true
otelCollector:
  replicaCount: 1
