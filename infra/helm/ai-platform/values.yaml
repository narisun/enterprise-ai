# Default values — override with values-dev.yaml or values-prod.yaml

litellm:
  image:
    # Mirrored to ECR so EKS nodes don't need internet access to ghcr.io.
    # To update: docker pull ghcr.io/berriai/litellm:main-stable && push to ECR.
    repository: "REPLACE_WITH_ECR_REGISTRY/enterprise-ai/litellm"
    tag: "main-stable"
    pullPolicy: IfNotPresent
  replicaCount: 2
  # IRSA role ARN for Bedrock access — set in values-dev.yaml / values-prod.yaml
  irsaRoleArn: ""
  # ElastiCache Redis endpoint — set via --set litellm.redisHost=<endpoint> at deploy time
  redisHost: "localhost"
  # Set to true when ElastiCache has transit_encryption_enabled = true
  redisSsl: false
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  service:
    port: 4000
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

otelCollector:
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.103.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Secret name containing INTERNAL_API_KEY, AZURE_API_KEY, DYNATRACE_API_TOKEN
# Created by External Secrets Operator from AWS Secrets Manager (see infra/k8s/secrets/)
secretName: ai-platform-secrets

opa:
  enabled: true
  image:
    repository: openpolicyagent/opa
    tag: "0.65.0"
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
