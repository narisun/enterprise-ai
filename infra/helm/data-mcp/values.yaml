image:
  repository: enterprise-ai/data-mcp
  # tag must always be overridden by CI with the git SHA — never deploy "latest".
  tag: "REPLACE_ME"
  pullPolicy: IfNotPresent

replicaCount: 2

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

service:
  port: 8080

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

env:
  MCP_TRANSPORT: sse
  DB_HOST: "REPLACE_WITH_RDS_ENDPOINT"   # set via --set at deploy time
  DB_PORT: "5432"
  DB_USER: "dbadmin"
  DB_NAME: ai_memory
  DB_REQUIRE_SSL: "false"               # set to "true" in values-dev/prod for RDS
  MAX_RESULT_BYTES: "15000"
  OPA_URL: "http://opa.ai-platform.svc.cluster.local:8181/v1/data/mcp/tools/allow"
  AGENT_ROLE: "data_analyst_agent"
  ENVIRONMENT: "dev"

# Secret containing DB_PASS, INTERNAL_API_KEY, OTEL creds
secretName: data-mcp-secrets
