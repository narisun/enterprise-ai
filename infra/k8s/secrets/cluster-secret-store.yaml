# ============================================================
# ClusterSecretStore — connects External Secrets Operator to AWS Secrets Manager.
#
# Prerequisites:
#   1. External Secrets Operator installed (see install-eso.sh)
#   2. IRSA role created (infra/terraform/iam — external_secrets_role_arn output)
#   3. Service account annotated with the IRSA role ARN:
#      kubectl annotate serviceaccount external-secrets \
#        -n external-secrets \
#        eks.amazonaws.com/role-arn=<IRSA_ROLE_ARN>
#
# Verification:
#   kubectl get clustersecretstore aws-secrets-manager -o jsonpath='{.status.conditions}'
#   # Should show: Ready=True
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1   # Must match the region where secrets are stored
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
