# ============================================================
# ExternalSecret manifests — one per Kubernetes Secret that
# the Helm charts reference via secretRef / secretName.
#
# Each ExternalSecret pulls from AWS Secrets Manager and creates
# a native Kubernetes Secret that the pods consume unchanged.
#
# Naming convention in Secrets Manager:
#   enterprise-ai/ai-platform   → ai-platform-secrets (K8s Secret)
#   enterprise-ai/ai-agents     → ai-agents-secrets
#   enterprise-ai/data-mcp      → data-mcp-secrets
#
# Create the Secrets Manager entries before applying these manifests.
# See DEPLOY.md Phase 3 for the aws secretsmanager create-secret commands.
#
# Verification:
#   kubectl get externalsecrets -A
#   kubectl get secrets -n ai-platform
#   kubectl describe secret ai-platform-secrets -n ai-platform
# ============================================================

# ---- ai-platform namespace secrets ------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-platform-secrets
  namespace: ai-platform
spec:
  refreshInterval: 1h   # Re-sync from Secrets Manager every hour
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: ai-platform-secrets
    creationPolicy: Owner   # ESO owns the K8s Secret lifecycle
  data:
    - secretKey: INTERNAL_API_KEY
      remoteRef:
        key: enterprise-ai/ai-platform
        property: INTERNAL_API_KEY
    - secretKey: AZURE_API_KEY
      remoteRef:
        key: enterprise-ai/ai-platform
        property: AZURE_API_KEY
    - secretKey: AZURE_API_BASE
      remoteRef:
        key: enterprise-ai/ai-platform
        property: AZURE_API_BASE
    - secretKey: DYNATRACE_API_TOKEN
      remoteRef:
        key: enterprise-ai/ai-platform
        property: DYNATRACE_API_TOKEN
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: enterprise-ai/ai-platform
        property: REDIS_PASSWORD
---
# ---- ai-agents secrets ------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-agents-secrets
  namespace: ai-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: ai-agents-secrets
    creationPolicy: Owner
  data:
    - secretKey: INTERNAL_API_KEY
      remoteRef:
        key: enterprise-ai/ai-platform
        property: INTERNAL_API_KEY
    - secretKey: JWT_SECRET
      remoteRef:
        key: enterprise-ai/ai-agents
        property: JWT_SECRET
    - secretKey: CONTEXT_HMAC_SECRET
      remoteRef:
        key: enterprise-ai/ai-agents
        property: CONTEXT_HMAC_SECRET
---
# ---- data-mcp secrets ------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: data-mcp-secrets
  namespace: ai-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: data-mcp-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASS
      remoteRef:
        key: enterprise-ai/database
        property: password
    - secretKey: INTERNAL_API_KEY
      remoteRef:
        key: enterprise-ai/ai-platform
        property: INTERNAL_API_KEY
