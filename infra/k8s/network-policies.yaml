# Network Policies for Enterprise AI Platform
# Enforces least-privilege pod-to-pod communication.
#
# Architecture:
#   frontends → agent-services → mcp-servers → {postgres, redis, opa}
#   All services → otel-collector (telemetry)
#
# Denied by default: any traffic not explicitly allowed.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ai-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Frontends can only reach agent services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-agents
  namespace: ai-platform
spec:
  podSelector:
    matchLabels:
      tier: frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              tier: agent
      ports:
        - port: 8000
          protocol: TCP
        - port: 8003
          protocol: TCP
        - port: 8004
          protocol: TCP
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Agent services can reach MCP servers and LiteLLM
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-agents-to-mcp
  namespace: ai-platform
spec:
  podSelector:
    matchLabels:
      tier: agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: frontend
      ports:
        - port: 8000
          protocol: TCP
        - port: 8003
          protocol: TCP
        - port: 8004
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              tier: mcp
      ports:
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
        - port: 8082
          protocol: TCP
        - port: 8083
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              component: litellm
      ports:
        - port: 4000
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              component: otel-collector
      ports:
        - port: 4318
          protocol: TCP
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# MCP servers can reach PostgreSQL, Redis, and OPA
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-to-infra
  namespace: ai-platform
spec:
  podSelector:
    matchLabels:
      tier: mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: agent
      ports:
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
        - port: 8082
          protocol: TCP
        - port: 8083
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              component: postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              component: redis
      ports:
        - port: 6379
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              component: opa
      ports:
        - port: 8181
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              component: otel-collector
      ports:
        - port: 4318
          protocol: TCP
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# OPA only accepts connections from MCP servers
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-opa-from-mcp
  namespace: ai-platform
spec:
  podSelector:
    matchLabels:
      component: opa
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: mcp
      ports:
        - port: 8181
          protocol: TCP

---
# PostgreSQL only accepts from MCP servers
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-mcp
  namespace: ai-platform
spec:
  podSelector:
    matchLabels:
      component: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: mcp
      ports:
        - port: 5432
          protocol: TCP
