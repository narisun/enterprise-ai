[pytest]
testpaths = tests
asyncio_mode = auto
log_cli = true
log_cli_level = WARNING
timeout = 60

markers =
    unit: Pure Python tests — no network, no database, no LLM
    integration: Tests requiring Docker Compose services (DB, OPA, MCP servers)
    eval: LLM-in-the-loop evaluation tests (requires LITELLM_BASE_URL or OPENAI_API_KEY)
    slow: Tests that take more than 30 seconds

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
