[project]
# Disable Chainlit's own telemetry — we use OpenTelemetry via platform-sdk
enable_telemetry = false

# Session timeout in seconds (1 hour)
session_timeout = 3600

# Disable response caching at the UI layer — LiteLLM already caches via Redis
cache = false

[features]
# Disable prompt playground — prevents users from bypassing the agent
prompt_playground = false

# Allow file uploads (enables future document Q&A capabilities)
multi_modal = true

# Disable speech-to-text for now
speech_to_text.enabled = false

# Enable LaTeX rendering (KaTeX) so mathematical expressions like \(\frac{a}{b}\)
# are rendered as proper math rather than shown as raw LaTeX source.
latex = true

[UI]
name = "Enterprise AI"
description = "Internal AI platform — powered by LangGraph, LiteLLM, and MCP"

# Dark theme matches most enterprise tooling environments
default_theme = "dark"

# Show tool call steps collapsed by default to keep the UI clean
# Users can expand them to inspect SQL queries, OPA decisions, etc.
default_collapse_content = true

# Hide the Chainlit watermark for white-label enterprise deployment
hide_cta = true

# Custom assets served from /app/public/ inside the container.
# custom.css  — hides the built-in README button.
# custom.js   — injects a Help item into the profile dropdown (above Logout)
#               and shows a version / environment modal when clicked.
custom_css = "/public/custom.css"
custom_js  = "/public/custom.js"

[meta]
generated_by = "1.3.0"
